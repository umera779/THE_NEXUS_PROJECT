<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Legacy Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
    :root {
      --bg: #0d0f12; --surface: #161a1f; --surface2: #1e242b;
      --border: #2a3140; --accent: #c8a96e; --text: #e8eaf0;
      --text-muted: #7a8494; --red: #e05c5c; --green: #5cb87a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 440px; padding: 24px; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent); margin-bottom: 8px; }
    .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; }
    h2 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 8px; font-weight: 400; }
    .hint { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px;
      font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    input { background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 11px 14px; border-radius: 7px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; width: 100%; outline: none; transition: border-color .2s; }
    input:focus { border-color: var(--accent); }
    input#code { font-size: 22px; letter-spacing: 8px; text-align: center; font-family: 'DM Mono', monospace; }
    button { background: var(--accent); color: #0d0f12; border: none; padding: 12px;
      border-radius: 7px; font-family: 'DM Sans', sans-serif; font-weight: 600;
      font-size: 14px; cursor: pointer; transition: opacity .2s; width: 100%; margin-top: 6px; }
    button:hover { opacity: .85; } button:disabled { opacity: .45; cursor: not-allowed; }
    .links { margin-top: 20px; font-size: 13px; color: var(--text-muted); text-align: center; }
    .links a { color: var(--accent); }
    .msg { margin-top: 12px; font-size: 13px; min-height: 18px; text-align: center; }
    .msg.error { color: var(--red); } .msg.ok { color: var(--green); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Legacy Portal</div>
    <div class="sub">Choose a new password for your account.</div>
    <div class="card">
      <h2>Reset Password</h2>
      <p class="hint">Enter the reset code sent to your email and choose a new password. You may use a backup email if your primary is unavailable.</p>
      <div class="form-group">
        <label for="email">Email Address (primary or backup)</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="code">Reset Code</label>
        <input type="text" id="code" maxlength="5" pattern="\d{5}" placeholder="12345" required>
      </div>
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" placeholder="••••••••" required minlength="8">
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" placeholder="••••••••" required>
      </div>
      <button id="submitBtn">Reset Password</button>
      <div id="msgBox" class="msg"></div>
    </div>
    <div class="links">
      <a href="/login">Back to login</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('email')) document.getElementById('email').value = params.get('email');

    async function apiPost(url, data) {
      return fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body: JSON.stringify(data) });
    }
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const btn = document.getElementById('submitBtn');
      const msgBox = document.getElementById('msgBox');
      const data = {
        email: document.getElementById('email').value.trim(),
        code: document.getElementById('code').value.trim(),
        new_password: document.getElementById('new_password').value,
        confirm_password: document.getElementById('confirm_password').value,
      };
      if (data.new_password !== data.confirm_password) {
        msgBox.textContent = 'Passwords do not match'; msgBox.className = 'msg error'; return;
      }
      btn.disabled = true; btn.textContent = 'Resetting…';
      const res = await apiPost('/reset-password', data);
      const json = await res.json();
      if (res.ok) {
        msgBox.textContent = 'Password reset! Redirecting to login…'; msgBox.className = 'msg ok';
        setTimeout(() => window.location.href = '/login', 2000);
      } else {
        msgBox.textContent = json.detail || 'Reset failed'; msgBox.className = 'msg error';
        btn.disabled = false; btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
