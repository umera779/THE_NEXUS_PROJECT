{% extends "base.html" %}
{% block title %}Forgot Password — The Nexus{% endblock %}

{% block body %}
<h1>Forgot Password</h1>
<p>Enter your email and we will send you a reset code.</p>

<form id="forgotForm">
    <div>
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
    </div>
    <button type="submit" id="submitBtn">Send Reset Code</button>
    <p id="msgBox"></p>
</form>

<p><a href="/login">Back to login</a></p>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Sending...';
    const email = document.getElementById('email').value.trim();

    const res = await apiPost('/forgot-password', { email });
    const json = await res.json();

    showMessage('msgBox', json.message || json.detail || 'Check your email.');
    if (res.ok) {
        setTimeout(() => {
            window.location.href = `/reset-password?email=${encodeURIComponent(email)}`;
        }, 2000);
    } else {
        btn.disabled = false; btn.textContent = 'Send Reset Code';
    }
});
</script>
{% endblock %}
