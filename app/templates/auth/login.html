<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Legacy Portal</title>
  <style>
    :root {
      --bg: #0d0f12; --surface: #161a1f; --surface2: #1e242b;
      --border: #2a3140; --accent: #c8a96e; --text: #e8eaf0;
      --text-muted: #7a8494; --red: #e05c5c; --green: #5cb87a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 420px; padding: 24px; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent);
      margin-bottom: 8px; letter-spacing: -.5px; }
    .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; }
    h2 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 24px; font-weight:400; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px;
      font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    input { background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 11px 14px; border-radius: 7px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; width: 100%; outline: none; transition: border-color .2s; }
    input:focus { border-color: var(--accent); }
    button { background: var(--accent); color: #0d0f12; border: none; padding: 12px;
      border-radius: 7px; font-family: 'DM Sans', sans-serif; font-weight: 600;
      font-size: 14px; cursor: pointer; transition: opacity .2s; width: 100%; margin-top: 6px; }
    button:hover { opacity: .85; } button:disabled { opacity: .45; cursor: not-allowed; }
    .links { margin-top: 20px; font-size: 13px; color: var(--text-muted); text-align: center; line-height: 2; }
    .links a { color: var(--accent); }
    .msg { margin-top: 12px; font-size: 13px; min-height: 18px; text-align: center; }
    .msg.error { color: var(--red); } .msg.ok { color: var(--green); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Legacy Portal</div>
    <div class="sub">Protect your investments. Secure your legacy.</div>
    <div class="card">
      <h2>Sign In</h2>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button id="submitBtn">Log In</button>
      <div id="msgBox" class="msg"></div>
    </div>
    <div class="links">
      <a href="/forgot-password">Forgot password?</a><br>
      Don't have an account? <a href="/signup">Sign up</a>
    </div>
  </div>

  <script>
    async function apiPost(url, data) {
      return fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body: JSON.stringify(data) });
    }
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msgBox = document.getElementById('msgBox');
      if (!email || !password) { msgBox.textContent = 'Please fill in all fields.'; msgBox.className = 'msg error'; return; }
      btn.disabled = true; btn.textContent = 'Signing in…';
      const res = await apiPost('/login', { email, password });
      const json = await res.json();
      if (res.ok) {
        msgBox.textContent = 'Login successful, redirecting…'; msgBox.className = 'msg ok';
        if (json.is_first_login || !json.is_pin_set) {
          setTimeout(() => window.location.href = '/dashboard?setup_pin=1', 1000);
        } else {
          setTimeout(() => window.location.href = '/dashboard', 1000);
        }
      } else {
        msgBox.textContent = json.detail || 'Login failed'; msgBox.className = 'msg error';
        btn.disabled = false; btn.textContent = 'Log In';
      }
    });
    document.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('submitBtn').click(); });
  </script>
</body>
</html>
