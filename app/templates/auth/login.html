{% extends "base.html" %}
{% block title %}Login — The Nexus{% endblock %}

{% block body %}
<h1>The Nexus— Login</h1>

<form id="loginForm">
    <div>
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
    </div>
    <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
    </div>
    <button type="submit" id="submitBtn">Log In</button>
    <p id="msgBox"></p>
</form>

<p><a href="/forgot-password">Forgot password?</a></p>
<p>Don't have an account? <a href="/signup">Sign up</a></p>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Logging in...';

    const data = {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
    };

    const res = await apiPost('/login', data);
    const json = await res.json();

    if (res.ok) {
        showMessage('msgBox', 'Login successful, redirecting...');
        if (json.is_first_login || !json.is_pin_set) {
            setTimeout(() => window.location.href = '/dashboard?setup_pin=1', 1000);
        } else {
            setTimeout(() => window.location.href = '/dashboard', 1000);
        }
    } else {
        showMessage('msgBox', json.detail || 'Login failed', true);
        btn.disabled = false; btn.textContent = 'Log In';
    }
});
</script>
{% endblock %}
