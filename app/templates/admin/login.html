{% extends "base.html" %}
{% block title %}Admin Login — The Nexus{% endblock %}

{% block body %}
<h1>The Nexus— Admin Login</h1>

<form id="adminLoginForm">
    <div>
        <label for="email">Admin Email</label>
        <input type="email" id="email" name="email" required>
    </div>
    <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
    </div>
    <button type="submit" id="submitBtn">Login</button>
    <p id="msgBox"></p>
</form>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Logging in...';

    const data = {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
    };

    const res = await apiPost('/admin/login', data);
    const json = await res.json();

    if (res.ok) {
        showMessage('msgBox', 'Login successful, redirecting...');
        setTimeout(() => window.location.href = '/admin', 1500);
    } else {
        showMessage('msgBox', json.detail || 'Login failed', true);
        btn.disabled = false; btn.textContent = 'Login';
    }
});
</script>
{% endblock %}
