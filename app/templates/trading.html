<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Portal — Trading</title>
</head>
<body>

<!-- Trade Modal -->
<div id="tradeModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#fff; padding:24px; width:360px; max-width:90vw;">
        <button onclick="closeModal()" style="float:right; cursor:pointer;">✕</button>
        <h3 id="modalTitle">Buy Stock</h3>
        <p id="modalSubtitle"></p>
        <div><strong>Price:</strong> <span id="modalPrice">—</span></div>
        <div style="margin:12px 0;">
            <label>Units:</label><br>
            <input type="number" id="modalUnits" step="any" style="width:100%; box-sizing:border-box;">
        </div>
        <div><strong id="costLabel">Total cost:</strong> <span id="modalCost">₦0.00</span></div>
        <div style="margin:12px 0;">
            <label>Transaction PIN (6 digits):</label><br>
            <input type="password" id="modalPin" maxlength="6" style="width:100%; box-sizing:border-box;">
        </div>
        <button id="modalSubmitBtn" style="margin-top:12px; padding:8px 16px; cursor:pointer;">Confirm</button>
        <p id="modalMsg" style="margin-top:8px;"></p>
    </div>
</div>

<!-- Header / nav -->
<header>
    <h1>Legacy Portal — Trade Stocks</h1>
    <nav>
        <a href="/dashboard">Dashboard</a> |
        <button id="refreshBtn" style="cursor:pointer;">↻ Refresh</button>
    </nav>
</header>

<!-- Wallet balance -->
<div>
    <strong>Wallet Balance:</strong> <span id="walletBalance">—</span>
</div>

<!-- Market Table -->
<section>
    <h2>Market & Holdings</h2>
    <table border="1" cellpadding="6" cellspacing="0" style="border-collapse:collapse; width:100%;">
        <thead>
            <tr>
                <th>Stock</th>
                <th>Symbol</th>
                <th>Current Price (₦)</th>
                <th>Current Value (₦)</th>
                <th>Gain/Loss (₦)</th>
                <th>Owned (units)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="marketTableBody">
            <tr><td colspan="7">Loading market data...</td></tr>
        </tbody>
    </table>
    <p id="marketMsg" style="color:red;"></p>
</section>

<script>
// State
let allStocks = [];
let walletBalance = 0.0;
let currentModalStock = null;
let currentModalMode = 'buy';
let sseSource = null;

// Helper functions
const formatMoney = (val, decimals = 2) => {
    if (val === undefined || val === null) return '—';
    const num = Number(val);
    if (isNaN(num)) return '—';
    return '₦' + num.toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
};

const formatUnits = (u) => {
    if (u === undefined || u === null) return '—';
    const num = Number(u);
    if (isNaN(num)) return '—';
    return num.toLocaleString(undefined, {minimumFractionDigits: 4, maximumFractionDigits: 4});
};

// Load wallet balance
async function loadWalletBalance() {
    try {
        const res = await fetch('/dashboard/balance', { credentials: 'same-origin' });
        if (!res.ok) return;
        const data = await res.json();
        walletBalance = Number(data.balance) || 0;
        document.getElementById('walletBalance').textContent = formatMoney(walletBalance);
    } catch (err) {
        console.warn('wallet fetch failed', err);
    }
}

// Load market data
async function loadMarketData() {
    try {
        const res = await fetch('/trading/market', { credentials: 'same-origin' });
        if (!res.ok) throw new Error('Failed to fetch market');
        const data = await res.json();
        allStocks = data.stocks || [];
        renderMarketTable();
        document.getElementById('marketMsg').textContent = '';
    } catch (err) {
        document.getElementById('marketMsg').textContent = 'Error loading market data.';
        console.error(err);
    }
}

// Render table
function renderMarketTable() {
    const tbody = document.getElementById('marketTableBody');
    if (!allStocks.length) {
        tbody.innerHTML = '<tr><td colspan="7">No stocks available.</td></tr>';
        return;
    }

    let html = '';
    for (const stock of allStocks) {
        const symbol = stock.symbol;
        const name = stock.name;
        const currentPrice = Number(stock.current_price) || 0;
        const ownedUnits = Number(stock.owned_units) || 0;
        const avgPrice = stock.avg_purchase_price ? Number(stock.avg_purchase_price) : null;

        const currentValue = ownedUnits * currentPrice;
        let gainLoss = null;
        if (ownedUnits > 0 && avgPrice !== null && avgPrice > 0) {
            gainLoss = (currentPrice - avgPrice) * ownedUnits;
        }

        const gainLossFormatted = (gainLoss !== null) 
            ? (gainLoss >= 0 ? '+' : '') + formatMoney(Math.abs(gainLoss))
            : '—';
        const gainLossColor = (gainLoss !== null) ? (gainLoss >= 0 ? 'green' : 'red') : 'black';
        const isSuspended = stock.trading_status === 1;

        // Escape for safety
        const safeName = escapeHtml(name);
        const safeSymbol = escapeHtml(symbol);

        html += `<tr>
            <td>${safeName}</td>
            <td>${safeSymbol}</td>
            <td>${formatMoney(currentPrice)}</td>
            <td>${ownedUnits > 0 ? formatMoney(currentValue) : '—'}</td>
            <td style="color:${gainLossColor};">${gainLossFormatted}</td>
            <td>${ownedUnits > 0 ? formatUnits(ownedUnits) : '—'}</td>
            <td>
                <button onclick="openTradeModal('${safeSymbol}', 'buy')" ${isSuspended ? 'disabled' : ''} style="cursor:pointer;">Buy</button>
                ${ownedUnits > 0 ? `<button onclick="openTradeModal('${safeSymbol}', 'sell')" ${isSuspended ? 'disabled' : ''} style="cursor:pointer; margin-left:4px;">Sell</button>` : ''}
            </td>
        </tr>`;
    }
    tbody.innerHTML = html;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// SSE real-time updates
function connectMarketStream() {
    if (sseSource) {
        sseSource.close();
    }
    sseSource = new EventSource('/market/stream', { withCredentials: true });

    sseSource.onmessage = (event) => {
        try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'price_update' && msg.prices) {
                let updated = false;
                for (const [sym, info] of Object.entries(msg.prices)) {
                    const stock = allStocks.find(s => s.symbol === sym);
                    if (stock) {
                        if (info.current_price !== undefined) stock.current_price = info.current_price;
                        if (info.change !== undefined) stock.change = info.change;
                        if (info.change_pct !== undefined) stock.change_pct = info.change_pct;
                        if (info.trading_status !== undefined) stock.trading_status = info.trading_status;
                        updated = true;
                    }
                }
                if (updated) {
                    renderMarketTable();
                }
            }
        } catch (e) {
            console.error('SSE parse error', e);
        }
    };

    sseSource.onerror = () => {
        console.warn('SSE connection lost, reconnecting in 10s');
        if (sseSource) sseSource.close();
        setTimeout(connectMarketStream, 10000);
    };
}

// Modal functions
function openTradeModal(symbol, mode) {
    const stock = allStocks.find(s => s.symbol === symbol);
    if (!stock) {
        alert('Stock data not loaded yet');
        return;
    }
    
    currentModalStock = stock;
    currentModalMode = mode;
    
    const isBuy = (mode === 'buy');
    const price = Number(stock.current_price) || 0;
    
    document.getElementById('modalTitle').textContent = isBuy ? `Buy ${symbol}` : `Sell ${symbol}`;
    document.getElementById('modalSubtitle').textContent = stock.name;
    document.getElementById('modalPrice').textContent = formatMoney(price);
    document.getElementById('costLabel').textContent = isBuy ? 'Total cost:' : 'Proceeds:';
    document.getElementById('modalCost').textContent = formatMoney(0);
    document.getElementById('modalUnits').value = '';
    document.getElementById('modalPin').value = '';
    document.getElementById('modalMsg').textContent = '';
    document.getElementById('modalMsg').style.color = 'black';
    
    const submitBtn = document.getElementById('modalSubmitBtn');
    submitBtn.textContent = isBuy ? 'Confirm Buy' : 'Confirm Sell';
    submitBtn.disabled = false;
    submitBtn.style.opacity = '1';
    
    document.getElementById('tradeModal').style.display = 'flex';
    document.getElementById('modalUnits').focus();
}

function closeModal() {
    document.getElementById('tradeModal').style.display = 'none';
    currentModalStock = null;
    currentModalMode = 'buy';
}

function updateModalCost() {
    if (!currentModalStock) return;
    const units = parseFloat(document.getElementById('modalUnits').value);
    if (isNaN(units) || units <= 0) {
        document.getElementById('modalCost').textContent = formatMoney(0);
        return;
    }
    const price = Number(currentModalStock.current_price) || 0;
    const amount = units * price;
    document.getElementById('modalCost').textContent = formatMoney(amount);
}

async function submitTrade() {
    if (!currentModalStock) {
        alert('No stock selected');
        return;
    }
    
    const units = parseFloat(document.getElementById('modalUnits').value);
    const pin = document.getElementById('modalPin').value.trim();
    const msgEl = document.getElementById('modalMsg');
    const btn = document.getElementById('modalSubmitBtn');
    
    // Validation
    if (isNaN(units) || units <= 0) {
        msgEl.textContent = 'Please enter a valid number of units.';
        msgEl.style.color = 'red';
        return;
    }
    
    if (!pin || pin.length !== 6 || !/^\d{6}$/.test(pin)) {
        msgEl.textContent = 'PIN must be exactly 6 digits.';
        msgEl.style.color = 'red';
        return;
    }
    
    // Sell validation
    if (currentModalMode === 'sell') {
        const owned = Number(currentModalStock.owned_units) || 0;
        if (units > owned + 0.0001) {
            msgEl.textContent = `You only own ${formatUnits(owned)} units of ${currentModalStock.symbol}.`;
            msgEl.style.color = 'red';
            return;
        }
    }
    
    // Buy validation - check wallet balance
    if (currentModalMode === 'buy') {
        const price = Number(currentModalStock.current_price) || 0;
        const totalCost = units * price;
        if (totalCost > walletBalance) {
            msgEl.textContent = `Insufficient funds. Need ${formatMoney(totalCost)}, have ${formatMoney(walletBalance)}.`;
            msgEl.style.color = 'red';
            return;
        }
    }
    
    btn.disabled = true;
    btn.style.opacity = '0.6';
    msgEl.textContent = 'Processing...';
    msgEl.style.color = 'black';
    
    const endpoint = currentModalMode === 'buy' ? '/trading/buy' : '/trading/sell';
    const payload = {
        stock_symbol: currentModalStock.symbol,
        units: units,
        pin: pin
    };
    
    try {
        const res = await fetch(endpoint, {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        const json = await res.json();
        
        if (res.ok) {
            msgEl.style.color = 'green';
            msgEl.textContent = json.message || 'Success!';
            
            // Refresh data after successful trade
            await loadWalletBalance();
            await loadMarketData();
            
            // Close modal after short delay
            setTimeout(() => {
                closeModal();
            }, 1500);
        } else {
            msgEl.style.color = 'red';
            msgEl.textContent = json.detail || 'Transaction failed. Please try again.';
            btn.disabled = false;
            btn.style.opacity = '1';
        }
    } catch (err) {
        console.error('Trade error:', err);
        msgEl.style.color = 'red';
        msgEl.textContent = 'Network error — please check your connection.';
        btn.disabled = false;
        btn.style.opacity = '1';
    }
}

async function manualRefresh() {
    document.getElementById('marketMsg').textContent = 'Refreshing...';
    await loadWalletBalance();
    await loadMarketData();
    document.getElementById('marketMsg').textContent = '';
}

// Close modal on backdrop click
document.getElementById('tradeModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// Escape key closes modal
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

// Update cost preview when units change
document.getElementById('modalUnits').addEventListener('input', updateModalCost);

// Submit button click handler
document.getElementById('modalSubmitBtn').onclick = submitTrade;

// Initialize
window.addEventListener('DOMContentLoaded', async () => {
    await loadWalletBalance();
    await loadMarketData();
    connectMarketStream();
    
    const refreshBtn = document.getElementById('refreshBtn');
    if (refreshBtn) {
        refreshBtn.addEventListener('click', manualRefresh);
    }
});
</script>
</body>
</html>
